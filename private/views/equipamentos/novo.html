<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="../../../assets/fontawesome/all.min.css">

    <!-- Google Fonts -->

        rel="stylesheet">

    <link rel="stylesheet" href="../../../assets/bootstrap/bootstrap.min.css">
</head>

<body>
    <header class="container-fluid bg-dark text-white">
        <div class="row align-items-center">
            <div class="col-6 d-flex align-items-center p-3">
                <a href="../../index.html">
                    <img src="../../../assets/img/logo.png" alt="Logo da MediSync" height="60" class="me-3">
                </a>
            </div>

            <div class="col-6 text-end p-3">
                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        Utilizador
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#">Alterar password</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item" href="../../../login.html">Sair</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>
    <div class="container-fluid">
        <div class="row">
            <aside class="col-md-3 col-lg-2 bg-secondary text-white p-3 min-vh-100">
                <h4>Menu</h4>
                <nav>
                    <a href="../../index.html" class="nav-link text-white px-0 mb-2 d-block">
                        Página Inicial
                    </a>
                    <a href="../dashboard/dashboard.html" class="nav-link text-white px-0 mb-2 d-block">
                        Dashboard
                    </a>
                    <a href="lista.html" class="nav-link text-white px-0 mb-2 d-block">
                        Equipamentos
                    </a>
                    <a href="../fornecedores/fornecedores.html" class="nav-link text-white px-0 mb-2 d-block">
                        Fornecedores
                    </a>
                    <a href="../documentacao/documentacao.html" class="nav-link text-white px-0 mb-2 d-block">
                        Documentação
                    </a>
                    <a href="../localizacao/localizacao.html" class="nav-link text-white px-0 mb-2 d-block">
                        Localizações
                    </a>
                </nav>
            </aside>
            <div class="col-md-9 col-lg-10 p-4">
                <h2>Novo Equipamento</h2>
                <hr>
                <form action="lista.html" method="post">
                    <div class="mb-3">
                        <label for="codigo">Código interno</label>
                        <input type="text" class="form-control" id="codigo" name="codigo">
                    </div>
                    <div class="mb-3">
                        <label for="designacao">Designação</label>
                        <input type="text" class="form-control" id="designacao" name="designacao">
                    </div>
                    <div class="mb-3">
                        <label for="categoria">Categoria</label>
                        <select class="form-select" id="categoria" name="categoria">
                            <option>Monitorização</option>
                            <option>Diagnóstico</option>
                            <option>Laboratório</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="marca">Marca</label>
                        <input type="text" class="form-control" id="marca" name="marca">
                    </div>
                    <div class="mb-3">
                        <label for="estado">Estado</label>
                        <select class="form-select" id="estado" name="estado">
                            <option>Ativo</option>
                            <option>Em manutenção</option>
                            <option>Inativo</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="criticidade">Criticidade</label>
                        <select class="form-select" id="criticidade" name="criticidade">
                            <option>Baixa</option>
                            <option>Média</option>
                            <option>Alta</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="localizacao">Localização</label>
                        <select class="form-select" id="localizacao" name="localizacao">
                            <option>Urgência</option>
                            <option>UCI</option>
                            <option>Cardiologia</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">
                        Guardar
                    </button>
                </form>
            </div>
            </select>
        </div>
        </form>
    </div>
    <script src="../../../assets/bootstrap/bootstrap.bundle.min.js"></script>
</body>

</html>
