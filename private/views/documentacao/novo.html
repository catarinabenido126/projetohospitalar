<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Documento - MediSync</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="../../../assets/img/logo.png" type="image/png">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="../../../assets/fontawesome/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="../../../assets/bootstrap/bootstrap.min.css">
    <!-- estilos -->
    <link rel="stylesheet" href="../../../assets/css/1241126.css">
</head>
<body>
    <header class="container-fluid barra-superior text-white">
        <div class="row align-items-center">
            <div class="col-6 d-flex align-items-center p-2">
                <a href="../../index.html">
                    <img src="../../../assets/img/logo.png" alt="Logo da MediSync" class="me-3">
                </a>
            </div>
            <div class="col-6 text-end">
                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        Utilizador
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="#">Alterar password</a>
                        </li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li>
                            <a class="dropdown-item" href="../../../login.html">Sair</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </header>
    <div class="container-fluid">
        <div class="row">
            <<aside class="col-md-3 col-lg-2 menu-lateral text-white p-3 min-vh-100">
                <h4 class="titulo-menu">Menu</h4>
                <nav class="nav flex-column menu-nav">
                    <a href="../../index.html" class="nav-link">
                        <i class="fa-solid fa-house"></i>
                        Página Inicial
                    </a>
                    <a href="../dashboard/dashboard.html" class="nav-link">
                        <i class="fa-solid fa-chart-line"></i>
                        Dashboard
                    </a>
                    <a href="../equipamentos/lista.html" class="nav-link">
                        <i class="fa-solid fa-stethoscope"></i>
                        Equipamentos
                    </a>
                    <a href="../fornecedores/lista.html" class="nav-link">
                        <i class="fa-solid fa-truck"></i>
                        Fornecedores
                    </a>
                    <a href="../documentacao/lista.html" class="nav-link">
                        <i class="fa-solid fa-file-lines"></i>
                        Documentação
                    </a>
                    <a href="../localizacao/lista.html" class="nav-link">
                        <i class="fa-solid fa-location-dot"></i>
                        Localizações
                    </a>
                </nav>
            </aside>
            <main class="col-md-9 col-lg-10 p-4 area-conteudo">
                <h2>Novo Documento</h2>
                <hr>
                <form action="../documentacao/lista.html" method="post">
                    <h4>Novo Documento</h4>
                    <div class="mb-3">
                        <label for="equipamento" class="form-label">Equipamento associado</label>
                        <input type="text" class="form-control" id="equipamento" name="equipamento" required>
                    </div>
                    <div class="mb-3">
                        <label for="tipoDocumento" class="form-label">Tipo de documento</label>
                        <select class="form-select" id="tipoDocumento" name="tipoDocumento" required>
                            <option value="">Selecione o tipo de documento</option>
                            <option>Manual técnico</option>
                            <option>Certificado</option>
                            <option>Contrato de manutenção</option>
                            <option>Relatório técnico</option>
                            <option>Fatura</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="nomeDocumento" class="form-label">Nome do documento</label>
                        <input type="text" class="form-control" id="nomeDocumento" name="nomeDocumento" required>
                    </div>
                    <div class="mb-3">
                        <label for="fornecedor" class="form-label">Fornecedor associado</label>
                        <input type="text" class="form-control" id="fornecedor" name="fornecedor">
                    </div>
                    <div class="mb-3">
                        <label for="dataDocumento" class="form-label">Data</label>
                        <input type="date" class="form-control" id="dataDocumento" name="dataDocumento">
                    </div>
                    <div class="mb-3">
                        <label for="estado" class="form-label">Estado</label>
                        <select class="form-select" id="estado" name="estado">
                            <option value="">Selecione o estado</option>
                            <option>Ativo</option>
                            <option>Válido</option>
                            <option>Expirado</option>
                            <option>Concluído</option>
                        </select>
                    </div>
                    <h4>Ficheiro</h4>
                    <div class="mb-3">
                        <label for="ficheiro" class="form-label">Carregar ficheiro PDF</label>
                        <input type="file" class="form-control" id="ficheiro" name="ficheiro">
                    </div>
                    <div class="mb-3">
                        <label for="observacoes" class="form-label">Observações</label>
                        <textarea class="form-control" id="observacoes" name="observacoes" rows="4"></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">
                        Guardar
                    </button>
                    <a href="../documentacao/lista.html" class="btn btn-secondary">
                        Cancelar
                    </a>
                </form>
            </main>
        </div>
    </div>
    <script src="../../../assets/bootstrap/bootstrap.bundle.min.js"></script>
</body>
</html>
