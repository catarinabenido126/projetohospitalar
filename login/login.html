<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediSync - Login</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../assets/bootstrap/bootstrap.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="../assets/css/1241126.css">
    <!-- favicon -->
    <link rel="shortcut icon" href="../assets/img/logo.png" type="image/png">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="../assets/fontawesome/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container-fluid mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-6 col-sm-8 col-10">
                <a href="../index.html" class="btn btn-secondary mb-3 voltar-btn">
                        Voltar</a>
                <!-- Borda à volta do formulário -->
                <div class="card p-4">
                    <div class="d-flex align-items-center justify-content-center my-4">
                        <img src="../assets/img/logo.png" alt="Logotipo da MediSync">
                    </div>
                    <!-- Formulário -->
                    <form action="../private/index.html" method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label">Utilizador</label>
                            <input type="email" name="email" id="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" name="password" id="password" class="form-control" required>
                        </div>
                        <!-- Submit -->
                        <div class="mb-3 text-center">
                            <button type="submit" class="btn btn-primary px-4">
                                Entrar <i class="fa-solid fa-right-to-bracket ms-2"></i>
                            </button>
                        </div>
                        <!-- Erros -->
                        <div class="alert alert-danger p-2 text-center">
                            Erro: Utilizador não registado
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="../assets/bootstrap/bootstrap.bundle.min.js"></script>
</body>
</html>
